name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Run tests
        run: |
          set -o pipefail
          npm test 2>&1 | tee test-output.txt

      - name: Run linter
        run: |
          set -o pipefail
          npm run lint 2>&1 | tee lint-output.txt

      - name: Upload CI logs
        uses: actions/upload-artifact@v3.1.2 # v3.1.2
        with:
          name: ci-logs
          path: |
            test-output.txt
            lint-output.txt